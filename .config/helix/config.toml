theme = "vixelated"

[editor]
line-number = "relative"
true-color=true
color-modes=true
text-width = 80

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode","file-base-name"]
right = ["version-control","position"]
separator = "│"
mode.normal = "N"
mode.insert = "I"
mode.select = "S"

